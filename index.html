<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朝活設定</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; margin-top: 10px; }
        .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .section-title {
            font-size: 15px; font-weight: 700; color: #333; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title .icon { font-size: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group select, .form-group input[type="text"] {
            width: 100%; padding: 11px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 15px; color: #333; background: #fafafa; appearance: none; -webkit-appearance: none;
        }
        .form-group select:focus, .form-group input[type="text"]:focus { outline: none; border-color: #43e97b; background: white; }
        .select-wrapper { position: relative; }
        .select-wrapper::after { content: "\25BC"; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 12px; color: #999; pointer-events: none; }
        .activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .activity-btn {
            padding: 10px 8px; border: 2px solid #e0e0e0; border-radius: 10px; background: #fafafa;
            font-size: 14px; color: #555; cursor: pointer; text-align: center; transition: all 0.2s; user-select: none;
        }
        .activity-btn.selected { border-color: #43e97b; background: #e8faf0; color: #2d8a56; font-weight: 600; }
        .free-text { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; color: #333; background: #fafafa; margin-top: 8px; resize: none; }
        .free-text:focus { outline: none; border-color: #43e97b; background: white; }
        .hint { font-size: 11px; color: #999; margin-top: 4px; line-height: 1.5; }
        .hint.stop { color: #e65100; }
        .preview { background: #f0f7f0; border-radius: 10px; padding: 14px; text-align: center; }
        .preview-label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .preview-text { font-size: 15px; color: #333; font-weight: 600; }
        .toggle-row {
            display: flex; align-items: center; justify-content: space-between; padding: 4px 0;
        }
        .toggle-label { font-size: 14px; color: #333; }
        .toggle-desc { font-size: 11px; color: #888; margin-top: 2px; }
        .toggle-switch { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: #ccc; border-radius: 28px; transition: 0.3s;
        }
        .toggle-slider::before {
            content: ""; position: absolute; height: 22px; width: 22px; left: 3px; bottom: 3px;
            background: white; border-radius: 50%; transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider { background: #43e97b; }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
        .btn-save {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer;
            margin-top: 4px; box-shadow: 0 4px 12px rgba(67, 233, 123, 0.4); letter-spacing: 1px;
        }
        .btn-save:active { opacity: 0.8; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading { text-align: center; padding: 60px 20px; color: white; font-size: 16px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-msg { text-align: center; padding: 40px 20px; }
        .success-msg .icon { font-size: 48px; margin-bottom: 12px; }
        .success-msg p { color: #333; font-size: 16px; line-height: 1.6; }
        .error-msg { text-align: center; padding: 40px 20px; }
        .error-msg p { color: #666; font-size: 14px; line-height: 1.6; }
        .stripe-status { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; }
        .stripe-status.linked { background: #ede7f6; }
        .stripe-status.unlinked { background: #fff3e0; }
        .stripe-status .status-icon { font-size: 24px; }
        .stripe-status .status-text { font-size: 14px; color: #333; line-height: 1.5; }
        .stripe-status .status-text .name { font-weight: 700; color: #667eea; }
        .btn-stripe {
            width: 100%; padding: 14px; background: #667eea; color: white; border: none;
            border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px;
        }
        .btn-stripe:active { opacity: 0.8; }
        .discord-status { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px; }
        .discord-status.linked { background: #e8faf0; }
        .discord-status.unlinked { background: #fff3e0; }
        .discord-status .status-icon { font-size: 24px; }
        .discord-status .status-text { font-size: 14px; color: #333; line-height: 1.5; }
        .discord-status .status-text .name { font-weight: 700; color: #5865F2; }
        .btn-discord {
            width: 100%; padding: 14px; background: #5865F2; color: white; border: none;
            border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px;
        }
        .btn-discord:active { opacity: 0.8; }
        .btn-discord:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-discord svg { width: 20px; height: 20px; fill: white; }
        .history-list { list-style: none; }
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; border-bottom: 1px solid #f0f0f0; gap: 8px;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item .history-info { flex: 1; min-width: 0; }
        .history-item .history-text { font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item .history-time { font-size: 11px; color: #999; margin-top: 2px; }
        .btn-delete {
            padding: 6px 12px; background: #fff0f0; color: #d32f2f; border: 1px solid #ffcdd2;
            border-radius: 8px; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
        }
        .btn-delete:active { opacity: 0.7; }
        .btn-delete:disabled { opacity: 0.4; cursor: not-allowed; }
        .history-empty { text-align: center; padding: 20px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>読み込み中...</p>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const LIFF_ID = "2006372055-RM8L5miT";
        const API_BASE = "https://api.asa-plant.com";

        const ACTIVITIES = [
            { id: "読書", label: "📖 読書" },
            { id: "勉強", label: "💻 勉強" },
            { id: "運動", label: "💪 運動" },
            { id: "副業", label: "✍️ 副業" },
            { id: "創作", label: "🎨 創作" },
            { id: "仕事", label: "💼 仕事" },
        ];

        const REMINDER_OPTIONS = [
            { value: "daily", label: "毎日" },
            { value: "weekday", label: "平日のみ" },
            { value: "3days", label: "週3（月・水・金）" },
            { value: "weekend", label: "週末のみ" },
            { value: "none", label: "通知なし" },
        ];

        let lineUserId = null;
        let currentProfile = null;
        let discordLinkStatus = null;
        let stripeLinkStatus = null;

        async function init() {
            try {
                const params = new URLSearchParams(location.search);

                // Discord OAuth コールバック（LIFF外から戻ってくる場合）
                if (params.get("mode") === "discord-callback") {
                    await handleDiscordCallback(params);
                    return;
                }

                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                const profile = await liff.getProfile();
                lineUserId = profile.userId;

                if (params.get("mode") === "declare") {
                    await runDeclareMode();
                } else {
                    await runSettingsMode();
                }
            } catch (e) {
                showError("初期化エラー: " + e.message);
            }
        }

        async function handleDiscordCallback(params) {
            const code = params.get("code");
            const state = params.get("state");
            const app = document.getElementById("app");

            if (!code || !state) {
                app.innerHTML = '<div class="card"><div class="error-msg"><p>Discord連携がキャンセルされました</p></div></div>';
                return;
            }

            app.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>Discord連携を処理中...</p></div>';

            try {
                const resp = await fetch(`${API_BASE}/api/discord-link/complete`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code, state }),
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || "連携に失敗しました");
                }
                const data = await resp.json();
                app.innerHTML = `<div class="card"><div class="success-msg">
                    <div class="icon">🎉</div>
                    <p>Discord連携が完了しました！</p>
                    <p style="font-size:14px; color:#5865F2; font-weight:700; margin-top:8px;">${data.discord_username}</p>
                    <p style="font-size:13px; color:#888; margin-top:12px;">朝活宣言がDiscordに自動転送されるようになりました</p>
                </div></div>`;
            } catch (e) {
                app.innerHTML = `<div class="card"><div class="error-msg">
                    <p>Discord連携に失敗しました</p>
                    <p style="margin-top:8px;">${e.message}</p>
                    <p style="margin-top:12px; font-size:12px; color:#999;">設定画面からもう一度お試しください</p>
                </div></div>`;
            }
        }

        async function runDeclareMode() {
            try {
                if (!liff.isInClient()) { showError("LINEアプリから開いてください"); return; }
                let declareText = "朝活します.";
                try {
                    const resp = await fetch(`${API_BASE}/api/profile?line_user_id=${lineUserId}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        if (data.found) declareText = buildDeclareText(data);
                    }
                } catch (apiErr) {}
                await liff.sendMessages([{ type: "text", text: declareText }]);
                liff.closeWindow();
            } catch (e) {
                showError("宣言の送信に失敗しました: " + e.message);
            }
        }

        function buildDeclareText(profile) {
            const hasTime = profile.wake_time && profile.wake_time.trim();
            const activities = profile.activities ? profile.activities.split(",").filter(a => a.trim()) : [];
            const freeItems = profile.free_text ? profile.free_text.split(",").map(s => s.trim()).filter(s => s) : [];
            const allActivities = [...activities, ...freeItems];

            if (hasTime && allActivities.length > 0) return `${profile.wake_time}に起きて${allActivities.join("と")}をします.`;
            if (hasTime) return `${profile.wake_time}に起きて朝活します.`;
            if (allActivities.length > 0) return `${allActivities.join("と")}をします.`;
            return "朝活します.";
        }

        async function runSettingsMode() {
            try {
                const [profileResp, discordResp, stripeResp] = await Promise.all([
                    fetch(`${API_BASE}/api/profile?line_user_id=${lineUserId}`),
                    fetch(`${API_BASE}/api/discord-link/status?line_user_id=${lineUserId}`),
                    fetch(`${API_BASE}/api/stripe-link/status?line_user_id=${lineUserId}`),
                ]);
                const profileData = await profileResp.json();
                if (profileData.found) currentProfile = profileData;
                discordLinkStatus = await discordResp.json();
                stripeLinkStatus = await stripeResp.json();
            } catch (e) {}
            renderSettingsForm();
        }

        function renderSettingsForm() {
            const app = document.getElementById("app");

            let timeOptions = '<option value="">指定しない</option>';
            for (let h = 3; h <= 10; h++) {
                for (let m = 0; m < 60; m += 30) {
                    const val = String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
                    const sel = currentProfile && currentProfile.wake_time === val ? "selected" : "";
                    timeOptions += `<option value="${val}" ${sel}>${val}</option>`;
                }
            }

            const selectedActivities = currentProfile && currentProfile.activities
                ? currentProfile.activities.split(",").map(a => a.trim()) : [];
            let activityBtns = "";
            ACTIVITIES.forEach(a => {
                const sel = selectedActivities.includes(a.id) ? "selected" : "";
                activityBtns += `<div class="activity-btn ${sel}" data-id="${a.id}" onclick="toggleActivity(this)">${a.label}</div>`;
            });

            const freeTextRaw = currentProfile && currentProfile.free_text ? currentProfile.free_text : "";
            const freeText = freeTextRaw.replace(/,/g, "\n");
            const goal = currentProfile && currentProfile.goal ? currentProfile.goal : "";

            let reminderOptions = "";
            REMINDER_OPTIONS.forEach(r => {
                const sel = currentProfile && currentProfile.reminder_freq === r.value ? "selected" : "";
                reminderOptions += `<option value="${r.value}" ${sel}>${r.label}</option>`;
            });

            app.innerHTML = `
                <!-- カード1: 目標 -->
                <div class="card">
                    <div class="section-title"><span class="icon">🎯</span> あなたの目標</div>
                    <p style="font-size:13px; color:#666; line-height:1.6; margin-bottom:12px;">目標を言葉にすると、毎日の朝活が「何のためにやっているか」とつながります。続けやすくなる一番のコツです。</p>
                    <div class="form-group" style="margin-bottom:0;">
                        <input type="text" id="goal" value="${goal}"
                               placeholder="例: TOEIC 800点を取る">
                        <p class="hint">マイレージ画面に表示されます</p>
                    </div>
                </div>

                <!-- カード2: 朝活宣言 -->
                <div class="card">
                    <div class="section-title"><span class="icon">🌅</span> 朝活宣言の設定</div>
                    <div class="toggle-row" style="margin-bottom:16px;">
                        <div>
                            <div class="toggle-label">簡易宣言モード</div>
                            <div class="toggle-desc">配信の「朝活します」ボタン1タップで宣言（時刻は選択式）</div>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="declareMode" ${currentProfile && currentProfile.declare_mode === "simple" ? "checked" : ""}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label>起床時間</label>
                        <div class="select-wrapper">
                            <select id="wakeTime" onchange="updatePreview()">${timeOptions}</select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>やること（複数選択OK）</label>
                        <div class="activity-grid" id="activityGrid">${activityBtns}</div>
                        <textarea class="free-text" id="freeText" rows="2"
                               placeholder="その他（1行に1つ）" oninput="updatePreview()">${freeText}</textarea>
                    </div>
                    <div class="preview">
                        <div class="preview-label">宣言プレビュー</div>
                        <div class="preview-text" id="previewText">朝活します.</div>
                    </div>
                </div>

                <!-- カード3: 通知 -->
                <div class="card">
                    <div class="section-title"><span class="icon">🔔</span> 通知設定</div>
                    <div class="form-group">
                        <label>朝活リマインド</label>
                        <div class="select-wrapper">
                            <select id="reminderFreq" onchange="updateReminderHint()">${reminderOptions}</select>
                        </div>
                        <p class="hint" id="reminderHint"></p>
                    </div>
                    <div class="toggle-row">
                        <div>
                            <div class="toggle-label">週次ふりかえり</div>
                            <div class="toggle-desc">毎週月曜に活動レポートが届きます</div>
                        </div>
                        <label class="toggle-switch">
                            <input type="checkbox" id="weeklyReview" ${currentProfile && currentProfile.weekly_review === "off" ? "" : "checked"}>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <!-- カード4: Discord連携 -->
                <div class="card">
                    <div class="section-title"><span class="icon">💬</span> Discord連携</div>
                    ${discordLinkStatus && discordLinkStatus.linked
                        ? `<div class="discord-status linked">
                            <div class="status-icon">✅</div>
                            <div class="status-text">連携済み: <span class="name">${discordLinkStatus.discord_username}</span><br>朝活宣言がDiscordに自動転送されます</div>
                        </div>`
                        : `<div class="discord-status unlinked">
                            <div class="status-icon">⚠️</div>
                            <div class="status-text">Discordと連携すると、LINEの朝活宣言がDiscordに自動転送されます</div>
                        </div>
                        <button class="btn-discord" id="discordLinkBtn" onclick="startDiscordLink()">
                            <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                            Discordアカウントを連携する
                        </button>`
                    }
                </div>

                <!-- カード5: Stripe連携 -->
                <div class="card">
                    <div class="section-title"><span class="icon">💳</span> 決済アカウント連携</div>
                    ${stripeLinkStatus && stripeLinkStatus.linked
                        ? `<div class="stripe-status linked">
                            <div class="status-icon">✅</div>
                            <div class="status-text">連携済み: <span class="name">${stripeLinkStatus.stripe_name || "確認済み"}</span><br>朝活配信・マイレージ割引が有効です</div>
                        </div>`
                        : `<div class="stripe-status unlinked">
                            <div class="status-icon">⚠️</div>
                            <div class="status-text">決済アカウントと連携すると、朝活配信やマイレージ割引が受け取れます</div>
                        </div>
                        <button class="btn-stripe" onclick="openStripeLink()">連携する</button>`
                    }
                </div>

                <!-- カード6: 送信履歴 -->
                <div class="card">
                    <div class="section-title"><span class="icon">📋</span> 送信履歴</div>
                    <div id="historyArea">
                        <div class="history-empty">読み込み中...</div>
                    </div>
                </div>

                <button class="btn-save" id="saveBtn" onclick="saveProfile()">保存する</button>
            `;
            updatePreview();
            updateReminderHint();
            loadDeclarationHistory();
        }

        function updateReminderHint() {
            const el = document.getElementById("reminderHint");
            if (!el) return;
            const val = document.getElementById("reminderFreq").value;
            const hints = {
                daily: "毎朝10時にLINEで朝活確認が届きます",
                weekday: "月〜金の朝10時にLINEで届きます",
                "3days": "月・水・金の朝10時にLINEで届きます",
                weekend: "土・日の朝10時にLINEで届きます",
                none: "朝活確認のLINEメッセージは届きません（配信停止）",
            };
            el.textContent = hints[val] || "";
            el.className = val === "none" ? "hint stop" : "hint";
        }

        function toggleActivity(el) { el.classList.toggle("selected"); updatePreview(); }

        function getSelectedActivities() {
            return Array.from(document.querySelectorAll(".activity-btn.selected")).map(b => b.dataset.id);
        }

        function updatePreview() {
            const wakeTime = document.getElementById("wakeTime").value;
            const activities = getSelectedActivities();
            const freeItems = document.getElementById("freeText").value.trim().split("\n").map(s => s.trim()).filter(s => s);
            const all = [...activities, ...freeItems];

            let text;
            if (wakeTime && all.length > 0) text = `${wakeTime}に起きて${all.join("と")}をします.`;
            else if (wakeTime) text = `${wakeTime}に起きて朝活します.`;
            else if (all.length > 0) text = `${all.join("と")}をします.`;
            else text = "朝活します.";

            const el = document.getElementById("previewText");
            if (el) el.textContent = text;
        }

        async function saveProfile() {
            const btn = document.getElementById("saveBtn");
            btn.disabled = true; btn.textContent = "保存中...";
            const body = {
                line_user_id: lineUserId,
                wake_time: document.getElementById("wakeTime").value,
                activities: getSelectedActivities().join(","),
                free_text: document.getElementById("freeText").value.trim().split("\n").map(s => s.trim()).filter(s => s).join(","),
                reminder_freq: document.getElementById("reminderFreq").value,
                weekly_review: document.getElementById("weeklyReview").checked ? "on" : "off",
                goal: document.getElementById("goal").value.trim(),
                declare_mode: document.getElementById("declareMode").checked ? "simple" : "full",
            };
            try {
                const resp = await fetch(`${API_BASE}/api/profile`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!resp.ok) throw new Error("保存に失敗しました");
                const isStop = body.reminder_freq === "none";
                document.getElementById("app").innerHTML = isStop
                    ? `<div class="card"><div class="success-msg">
                        <div class="icon">🔕</div>
                        <p>配信を停止しました</p>
                        <p style="font-size:13px; color:#888; margin-top:12px;">配信を再開したいときは、もう一度この設定画面から頻度を変更してください</p>
                    </div></div>`
                    : `<div class="card"><div class="success-msg">
                        <div class="icon">✅</div>
                        <p>設定を保存しました！</p>
                        <p style="font-size:13px; color:#888; margin-top:12px;">次回の宣言から反映されます</p>
                    </div></div>`;
                setTimeout(() => { if (liff.isInClient()) liff.closeWindow(); }, 2000);
            } catch (e) {
                btn.disabled = false; btn.textContent = "保存する";
                alert("保存に失敗しました: " + e.message);
            }
        }

        async function loadDeclarationHistory() {
            const area = document.getElementById("historyArea");
            if (!area) return;
            try {
                const resp = await fetch(`${API_BASE}/api/declarations?line_user_id=${lineUserId}`);
                if (!resp.ok) throw new Error("取得失敗");
                const data = await resp.json();
                const items = data.declarations || [];
                if (items.length === 0) {
                    area.innerHTML = '<div class="history-empty">送信履歴はありません</div>';
                    return;
                }
                let html = '<ul class="history-list">';
                for (const item of items) {
                    const text = item.declaration_text || "宣言";
                    const time = item.created_at || "";
                    html += `<li class="history-item" id="decl-${item.id}">
                        <div class="history-info">
                            <div class="history-text">${escapeHtml(text)}</div>
                            <div class="history-time">${escapeHtml(time)}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteDeclaration(${item.id}, this)">取り消し</button>
                    </li>`;
                }
                html += '</ul>';
                area.innerHTML = html;
            } catch (e) {
                area.innerHTML = '<div class="history-empty">履歴の取得に失敗しました</div>';
            }
        }

        function escapeHtml(str) {
            const d = document.createElement("div");
            d.textContent = str;
            return d.innerHTML;
        }

        async function deleteDeclaration(id, btn) {
            if (!confirm("この宣言をDiscordから削除しますか？")) return;
            btn.disabled = true;
            btn.textContent = "削除中...";
            try {
                const resp = await fetch(`${API_BASE}/api/declarations/${id}?line_user_id=${lineUserId}`, {
                    method: "DELETE",
                });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({}));
                    throw new Error(err.detail || "削除に失敗しました");
                }
                const li = document.getElementById(`decl-${id}`);
                if (li) {
                    li.style.opacity = "0.3";
                    li.style.textDecoration = "line-through";
                    btn.textContent = "削除済み";
                }
            } catch (e) {
                alert("削除に失敗しました: " + e.message);
                btn.disabled = false;
                btn.textContent = "取り消し";
            }
        }

        function openStripeLink() {
            const url = "https://liff.line.me/2006372055-1rYAwpea";
            if (liff.isInClient()) {
                liff.openWindow({ url, external: false });
            } else {
                location.href = url;
            }
        }

        async function startDiscordLink() {
            const btn = document.getElementById("discordLinkBtn");
            if (btn) { btn.disabled = true; btn.textContent = "準備中..."; }
            try {
                const resp = await fetch(`${API_BASE}/api/discord-link/start`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ line_user_id: lineUserId }),
                });
                if (!resp.ok) throw new Error("連携の開始に失敗しました");
                const data = await resp.json();
                // Discord OAuth ページへ遷移（外部ブラウザで開く）
                if (liff.isInClient()) {
                    liff.openWindow({ url: data.auth_url, external: true });
                } else {
                    location.href = data.auth_url;
                }
            } catch (e) {
                alert("エラー: " + e.message);
                if (btn) { btn.disabled = false; btn.textContent = "Discordアカウントを連携する"; }
            }
        }

        function showError(msg) {
            document.getElementById("app").innerHTML = `<div class="card"><div class="error-msg"><p>${msg}</p></div></div>`;
        }

        init();
    </script>
</body>
</html>
